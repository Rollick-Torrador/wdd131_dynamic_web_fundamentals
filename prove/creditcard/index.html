<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Credit Card</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <main>
            <section>
                <section class="errors"></section>
                <form id="formGrid" action="#" method="get">    
                    <div id="front-card">
                        <div class="front-grid">
                            <p class="total">TOTAL: $190</p>
                            <div class="chip" aria-hidden="true">
                                <img src="images/credit-card-chip.png">
                            </div>
                            <div id="cardNumber">
                                <label for="cardnumber">CARD NUMBER</label>
                                <input type="text" 
                                id="cardnumber" 
                                name="cardnumber" 
                                placeholder="1234 6578 9101 1025" 
                                required>
                            </div>
                            <div id="cardHolder">
                                <label for="cardholder">CARD HOLDER</label>
                                <input type="text" 
                                id="cardholder" 
                                name="cardholder" 
                                placeholder="John Doe" 
                                required>
                            </div>  
                            <div id="cardExpiration">
                                <span id="expirationLabel">EXPIRATION</span>
                                <input type='text' 
                                id='month' 
                                name="expMonth" 
                                placeholder="MM" 
                                aria-labelledby="expirationLabel" 
                                aria-label="Expiration Month"
                                required>
                                <input type='text' 
                                id='year' 
                                name="expYear" 
                                placeholder="YY" 
                                aria-labelledby="expirationLabel" 
                                aria-label="Expiration Year"
                                required>
                            </div>
                        </div>
                    </div>
                    <div id="back-card">
                        <div class="back-grid">
                            <div id="magstrip"></div>
                            <div id="cvv">
                            <label for="cvvInput">CVC/CVV</label>
                            <input id="cvvInput" name="cvv" type="text" placeholder="xxx" required>
                            </div>
                        </div>
                    </div>
                    <button>Submit</button>
                </form>    
            </section>
        </main>
    </body>
</html>
